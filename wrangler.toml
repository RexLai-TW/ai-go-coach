name = "ai-go-coach"
pages_build_output_dir = "dist/public"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "ai-go-coach-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[vars]
VITE_APP_ID = ""
OWNER_OPEN_ID = ""

# Secrets — set via CF Pages dashboard → Settings → Environment Variables:
#   JWT_SECRET
#   OAUTH_SERVER_URL
#   BUILT_IN_FORGE_API_URL   (optional)
#   BUILT_IN_FORGE_API_KEY   (optional)
